<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARINE-LAB | Referensi Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
            color: #333;
        }
        /* Style Banner Atas */
        .hero-banner {
            background: linear-gradient(rgba(0, 77, 64, 0.8), rgba(0, 33, 27, 0.9)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1353&q=80') no-repeat center center/cover;
            color: white;
            padding: 80px 0;
            text-align: center;
            border-bottom: 5px solid #ffb74d; /* Aksen warna emas laut */
        }
        .hero-banner h1 { font-weight: 700; font-size: 3rem; margin-bottom: 10px; }
        .hero-banner p { font-size: 1.2rem; opacity: 0.9; }

        /* Style Tombol Lingkaran Prodi */
        .prodi-container { margin-top: -50px; }
        .prodi-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }
        .circle-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #004D40;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(0,77,64,0.2);
            border: 4px solid white;
            overflow: hidden; /* Biar gambar melingkar sempurna */
        }
        .circle-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .circle-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,77,64,0.3);
            color: white;
        }
        .prodi-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #004D40;
            margin-top: 10px;
            min-height: 45px;
        }

        /* Style Form Kuesioner */
        .feedback-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 50px;
            border-left: 6px solid #004D40;
        }
        .form-label { font-weight: 600; color: #004D40; }
        .btn-submit {
            background: #004D40;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #002d25; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="hero-banner">
        <div class="container">
            <h1>REFERENSI DIGITAL</h1>
            <p>Pusat Pangkalan Data Akademik Jurusan Teknologi Maritim - ITK</p>
        </div>
    </div>

    <div class="container prodi-container">
        <div class="prodi-card text-center">
            <h3 class="mb-5" style="color: #004D40; font-weight: 700;">Pilih Program Studi</h3>
            
            <div class="row justify-content-center g-4 mb-4">
                <div class="col-6 col-md-4">
                    <a href="https://drive.google.com" class="circle-btn" target="_blank">
                        <img src="https://via.placeholder.com/160?text=Prodi+1" alt="Prodi 1">
                    </a>
                    <div class="prodi-name">Teknik Perkapalan</div>
                </div>
                <div class="col-6 col-md-4">
                    <a href="https://drive.google.com" class="circle-btn" target="_blank">
                        <img src="https://via.placeholder.com/160?text=Prodi+2" alt="Prodi 2">
                    </a>
                    <div class="prodi-name">Teknik Kelautan</div>
                </div>
                <div class="col-6 col-md-4">
                    <a href="https://drive.google.com" class="circle-btn" target="_blank">
                        <img src="https://via.placeholder.com/160?text=Prodi+3" alt="Prodi 3">
                    </a>
                    <div class="prodi-name">Teknik Sistem Perkapalan</div>
                </div>
            </div>

            <div class="row justify-content-center g-4">
                <div class="col-6 col-md-4">
                    <a href="https://drive.google.com" class="circle-btn" target="_blank">
                        <img src="https://via.placeholder.com/160?text=Prodi+4" alt="Prodi 4">
                    </a>
                    <div class="prodi-name">Teknik Transportasi Laut</div>
                </div>
                <div class="col-6 col-md-4">
                    <a href="https://drive.google.com" class="circle-btn" target="_blank">
                        <img src="https://via.placeholder.com/160?text=Prodi+5" alt="Prodi 5">
                    </a>
                    <div class="prodi-name">Teknik Lingkungan</div>
                </div>
            </div>
        </div>

        <div class="feedback-section">
            <h3 class="mb-4" style="color: #004D40; font-weight: 700;">Kuesioner Saran & Kritik</h3>
            
            <form id="marineFeedback">
                <div class="mb-3">
                    <label class="form-label">Bagaimana penilaian Anda terhadap kemudahan akses web ini?</label>
                    <select class="form-select" required>
                        <option value="">Pilih Skor...</option>
                        <option value="5">Sangat Mudah</option>
                        <option value="4">Mudah</option>
                        <option value="3">Biasa Saja</option>
                        <option value="2">Sulit</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Saran untuk pengembangan ke depan:</label>
                    <textarea class="form-control" rows="4" placeholder="Tuliskan masukan Anda di sini..." required></textarea>
                </div>

                <div class="text-end">
                    <button type="button" class="btn-submit" onclick="alert('Terima kasih! Masukan Anda telah tersimpan.')">Kirim Masukan</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="text-center text-muted py-4">
        <small>&copy; 2026 Jurusan Teknologi Maritim - ITK. All Rights Reserved.</small>
    </footer>

</body>
</html>
